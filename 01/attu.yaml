apiVersion: apps/v1
kind: Deployment
metadata:
  name: attu
  namespace: rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: attu
  template:
    metadata:
      labels:
        app: attu
    spec:
      containers:
      - name: attu
        image: zilliz/attu:latest
        ports:
        - containerPort: 3000
        env:
        - name: MILVUS_URL
          value: "milvus-service:19530"
---
apiVersion: v1
kind: Service
metadata:
  name: attu
  namespace: rag
spec:
  selector:
    app: attu
  ports:
  - name: http
    port: 80
    targetPort: 3000
